<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kismet House</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A5A7A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kismet">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root {
  --sky:#C8E8F5;--ocean:#2E7DAB;--ocean-dark:#1A5A7A;--sand:#F7EDD0;--sand-mid:#EDD99A;
  --sand-dark:#C9A84C;--wood:#8B6340;--wood-light:#C4956A;--leaf:#4A8C5C;
  --bronze:#B87333;--bronze-bg:#FBF0E3;--silver:#909090;--silver-bg:#F2F2F2;
  --gold:#C9A227;--gold-bg:#FEF9E7;--cream:#FDFAF2;--text:#2C1E0F;--muted:#7A6247;
  --danger:#c0392b;--radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--sky);color:var(--text);min-height:100vh;}
.site-header{background:var(--ocean-dark);position:relative;text-align:center;overflow:hidden;}
.header-rope{position:absolute;top:10px;left:0;right:0;height:5px;background:repeating-linear-gradient(90deg,var(--sand-dark) 0 8px,var(--wood-light) 8px 16px);opacity:0.6;}
.header-inner{padding:2rem 1rem 2.2rem;}
.site-title{font-family:'Lilita One',cursive;font-size:3rem;color:var(--sand);letter-spacing:1px;text-shadow:3px 3px 0 rgba(0,0,0,0.3);line-height:1;}
.site-sub{font-size:.75rem;color:var(--sky);letter-spacing:3px;text-transform:uppercase;margin-top:6px;font-weight:700;}
.wave-divider{display:block;width:100%;height:38px;}
.sync-bar{background:var(--sand);border-bottom:2px solid var(--sand-mid);padding:6px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.sync-dot{width:9px;height:9px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background .3s;}
.sync-dot.live{background:#4A8C5C;}
.sync-dot.err{background:#c0392b;}
.sync-label{font-size:11px;font-weight:800;color:var(--muted);}
.main-nav{background:var(--sand);display:flex;gap:6px;padding:10px 16px;border-bottom:3px solid var(--sand-mid);flex-wrap:wrap;}
.nav-btn{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;padding:7px 18px;border-radius:99px;border:2.5px solid var(--sand-dark);background:var(--cream);color:var(--wood);cursor:pointer;transition:all .15s;}
.nav-btn:hover{background:var(--sand-mid);border-color:var(--wood);}
.nav-btn.active{background:var(--ocean);color:white;border-color:var(--ocean-dark);}
main{padding:1.25rem 1.25rem 5rem;max-width:1100px;margin:0 auto;}
.section-title{font-family:'Lilita One',cursive;font-size:1.6rem;color:var(--ocean-dark);margin:1.25rem 0 .9rem;}
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px;}
.player-card{background:var(--cream);border-radius:var(--radius);padding:1rem .75rem .85rem;text-align:center;cursor:pointer;border:3px solid var(--sand-mid);transition:all .15s;box-shadow:3px 3px 0 var(--sand-dark);}
.player-card:hover{border-color:var(--ocean);transform:translateY(-3px);box-shadow:3px 6px 0 var(--ocean);}
.p-avatar{width:54px;height:54px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;border:3px solid rgba(255,255,255,0.6);}
.p-name{font-size:13px;font-weight:800;color:var(--text);}
.p-count{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600;}
.p-pips{display:flex;gap:3px;justify-content:center;margin-top:7px;flex-wrap:wrap;}
.pip{width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.1);}
.profile-header{background:var(--cream);border-radius:var(--radius);padding:1.25rem 1.5rem;display:flex;align-items:center;gap:1.25rem;border:3px solid var(--sand-mid);box-shadow:3px 3px 0 var(--sand-dark);margin-bottom:1rem;flex-wrap:wrap;}
.profile-avatar{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;border:3px solid rgba(255,255,255,0.5);flex-shrink:0;}
.profile-name{font-family:'Lilita One',cursive;font-size:1.5rem;color:var(--ocean-dark);line-height:1.1;}
.profile-stats{display:flex;gap:1.25rem;margin-top:8px;flex-wrap:wrap;}
.ps{text-align:center;}
.ps-num{font-size:1.3rem;font-weight:800;line-height:1;}
.ps-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;}
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px;}
.ach-card{background:var(--cream);border-radius:var(--radius);padding:1rem 1.1rem;border:3px solid var(--sand-mid);box-shadow:3px 3px 0 var(--sand-dark);}
.ach-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.ach-title{font-family:'Lilita One',cursive;font-size:1rem;color:var(--ocean-dark);line-height:1.2;}
.tier-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1.5px dashed var(--sand-mid);}
.tier-label{font-size:9px;font-weight:800;padding:3px 6px;border-radius:99px;text-transform:uppercase;letter-spacing:.2px;flex-shrink:0;width:48px;text-align:center;}
.tl-bronze{background:var(--bronze-bg);color:var(--bronze);border:1.5px solid var(--bronze);}
.tl-silver{background:var(--silver-bg);color:#555;border:1.5px solid var(--silver);}
.tl-gold{background:var(--gold-bg);color:#8A6A00;border:1.5px solid var(--gold);}
.tier-progress-wrap{flex:1;min-width:0;}
.tier-desc{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px;line-height:1.3;}
.prog-bar-outer{height:8px;border-radius:99px;background:var(--sand-mid);overflow:hidden;}
.prog-bar-fill{height:100%;border-radius:99px;transition:width .4s;}
.prog-label{font-size:10px;font-weight:800;color:var(--muted);margin-top:2px;text-align:right;}
.stepper{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.step-btn{width:26px;height:26px;border-radius:50%;border:2px solid var(--sand-dark);background:var(--cream);font-size:15px;font-weight:800;color:var(--wood);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;font-family:'Nunito',sans-serif;line-height:1;}
.step-btn:hover{background:var(--sand-mid);}
.check-toggle{width:28px;height:28px;border-radius:50%;border:2.5px solid var(--sand-dark);background:var(--cream);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;flex-shrink:0;color:transparent;}
.check-toggle:hover{border-color:var(--leaf);}
.check-toggle.done{background:var(--leaf);border-color:var(--leaf);color:white;}
.check-toggle.done:hover{background:var(--danger);border-color:var(--danger);}
.leaderboard{background:var(--cream);border-radius:var(--radius);border:3px solid var(--sand-mid);box-shadow:3px 3px 0 var(--sand-dark);overflow:hidden;}
.lb-row{display:flex;align-items:center;gap:12px;padding:11px 1.25rem;border-bottom:1.5px dashed var(--sand-mid);cursor:pointer;transition:background .1s;}
.lb-row:hover{background:#EAF6FF;}
.lb-row:last-child{border-bottom:none;}
.lb-rank{font-family:'Lilita One',cursive;font-size:1.1rem;width:28px;text-align:center;flex-shrink:0;color:var(--muted);}
.lb-rank.r1{color:var(--gold);}.lb-rank.r2{color:var(--silver);}.lb-rank.r3{color:var(--bronze);}
.lb-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.lb-name{font-weight:800;font-size:14px;flex:1;}
.lb-right{font-size:12px;color:var(--muted);display:flex;gap:8px;align-items:center;}
.fish-table{width:100%;border-collapse:collapse;background:var(--cream);border-radius:var(--radius);overflow:hidden;border:3px solid var(--sand-mid);box-shadow:3px 3px 0 var(--sand-dark);}
.fish-table th{background:var(--ocean-dark);color:var(--sand);padding:10px 14px;font-size:12px;font-weight:800;text-align:left;letter-spacing:1px;text-transform:uppercase;}
.fish-table td{padding:9px 14px;font-size:13px;border-bottom:1.5px dashed var(--sand-mid);vertical-align:middle;}
.fish-table tr:last-child td{border-bottom:none;}
.fish-table tr:hover td{background:#EAF6FF;}
.fish-name{font-weight:700;color:var(--ocean-dark);}
.catcher-tag{position:relative;display:inline-flex;align-items:center;font-size:11px;background:#D4EEF7;color:var(--ocean-dark);padding:3px 22px 3px 9px;border-radius:99px;font-weight:700;margin:2px;cursor:default;}
.catcher-tag .tag-x{position:absolute;right:5px;top:50%;transform:translateY(-50%);font-size:11px;color:transparent;cursor:pointer;line-height:1;transition:color .15s;font-weight:900;}
.catcher-tag:hover .tag-x{color:var(--danger);}
.catcher-tag:hover{background:#fce4e4;}
.fish-btn{font-size:11px;padding:4px 12px;border-radius:99px;border:2px solid var(--ocean);background:var(--cream);color:var(--ocean);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;transition:all .15s;white-space:nowrap;}
.fish-btn:hover{background:var(--ocean);color:white;}
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(20,40,60,.55);z-index:200;align-items:center;justify-content:center;}
.modal-backdrop.open{display:flex;}
.modal-box{background:var(--cream);border-radius:var(--radius);border:3px solid var(--sand-mid);box-shadow:4px 4px 0 var(--sand-dark);padding:1.5rem;width:92%;max-width:400px;max-height:85vh;overflow-y:auto;}
.modal-title{font-family:'Lilita One',cursive;font-size:1.3rem;color:var(--ocean-dark);margin-bottom:1rem;}
.modal-close-btn{float:right;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted);line-height:1;}
.modal-label{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px;margin-top:10px;}
.modal-box select,.modal-box input[type=text],.modal-box input[type=number]{width:100%;padding:9px 12px;border:2px solid var(--sand-mid);border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;color:var(--text);background:white;}
.modal-submit{width:100%;padding:11px;background:var(--ocean);color:white;border:none;border-radius:10px;font-family:'Lilita One',cursive;font-size:1rem;cursor:pointer;margin-top:14px;transition:background .15s;}
.modal-submit:hover{background:var(--ocean-dark);}
.map-outer{position:relative;background:var(--cream);border-radius:var(--radius);border:3px solid var(--sand-mid);box-shadow:3px 3px 0 var(--sand-dark);overflow:hidden;}
.map-outer svg{display:block;width:100%;}
.map-tip{position:absolute;z-index:20;pointer-events:none;opacity:0;transition:opacity .15s;}
.map-tip.on{opacity:1;}
.map-tip-box{background:#1A365D;color:#fff;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;padding:8px 12px;border-radius:10px;border:2px solid var(--sand-dark);min-width:160px;box-shadow:2px 2px 0 rgba(0,0,0,0.2);}
.map-tip-title{font-family:'Lilita One',cursive;font-size:14px;color:var(--sand-mid);margin-bottom:5px;}
.map-tip-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:2px 0;font-size:11px;}
.map-lm{cursor:pointer;}
.fish-card-tooltip{position:absolute;z-index:30;pointer-events:none;opacity:0;transition:opacity .15s;background:var(--ocean-dark);color:#fff;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;padding:8px 12px;border-radius:10px;border:2px solid var(--sand-dark);width:220px;box-shadow:2px 2px 0 rgba(0,0,0,0.2);line-height:1.5;}
.fish-card-tooltip.on{opacity:1;}
.fish-card-wrap{position:relative;cursor:pointer;}
.fab-wrap{position:fixed;bottom:1.5rem;right:1.5rem;z-index:100;}
.tl-bronze{background:var(--bronze-bg);color:var(--bronze);border:1.5px solid var(--bronze);display:flex;align-items:center;justify-content:center;}
.fab{background:var(--ocean-dark);color:var(--sand);border:none;border-radius:99px;padding:12px 22px;font-family:'Lilita One',cursive;font-size:1rem;cursor:pointer;box-shadow:3px 3px 0 var(--ocean);transition:transform .1s;}
.fab:hover{transform:scale(1.04);}
.back-btn{background:none;border:none;color:var(--ocean);font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;padding:4px 0;margin-bottom:8px;display:inline-flex;align-items:center;gap:4px;}
.loading{text-align:center;padding:4rem 1rem;font-family:'Lilita One',cursive;font-size:1.4rem;color:var(--ocean-dark);}

/* ── PHOTO THUMBNAIL in tier row ── */
.tier-photo-thumb{width:36px;height:36px;border-radius:8px;object-fit:cover;border:2px solid var(--sand-mid);cursor:pointer;flex-shrink:0;transition:transform .15s;}
.tier-photo-thumb:hover{transform:scale(1.08);border-color:var(--ocean);}
.tier-cam-placeholder{width:36px;height:36px;border-radius:8px;border:2px dashed var(--sand-dark);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;opacity:0.5;transition:opacity .15s;}
.tier-cam-placeholder:hover{opacity:1;border-color:var(--ocean);}

/* ── PHOTO LIGHTBOX ── */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.lightbox.open{display:flex;}
.lightbox img{max-width:92vw;max-height:80vh;border-radius:12px;border:3px solid var(--sand);}
.lightbox-close{background:var(--sand);border:none;border-radius:99px;padding:8px 22px;font-family:'Lilita One',cursive;font-size:1rem;cursor:pointer;color:var(--ocean-dark);}
.lightbox-caption{color:var(--sand);font-size:13px;font-weight:700;text-align:center;}

/* ── PHOTO PROMPT MODAL ── */
.photo-prompt-box{background:var(--cream);border-radius:var(--radius);border:3px solid var(--sand-mid);box-shadow:4px 4px 0 var(--sand-dark);padding:1.5rem;width:92%;max-width:380px;}
.photo-preview{width:100%;max-height:200px;object-fit:cover;border-radius:10px;margin-top:10px;display:none;border:2px solid var(--sand-mid);}
.photo-upload-area{border:2.5px dashed var(--sand-dark);border-radius:10px;padding:1.5rem;text-align:center;cursor:pointer;margin-top:10px;transition:border-color .15s;background:white;}
.photo-upload-area:hover{border-color:var(--ocean);}
.photo-upload-area input[type=file]{display:none;}
.btn-skip{width:100%;padding:10px;background:transparent;color:var(--muted);border:2px solid var(--sand-mid);border-radius:10px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;margin-top:8px;transition:all .15s;}
.btn-skip:hover{border-color:var(--wood);color:var(--wood);}

/* ── FEED ── */
.feed-empty{text-align:center;padding:3rem 1rem;color:var(--muted);font-weight:700;font-size:14px;}
.feed-card{background:var(--cream);border-radius:var(--radius);border:3px solid var(--sand-mid);box-shadow:3px 3px 0 var(--sand-dark);padding:1rem 1.1rem;margin-bottom:12px;}
.feed-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.feed-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.feed-meta{flex:1;}
.feed-who{font-weight:800;font-size:14px;color:var(--text);}
.feed-what{font-size:12px;color:var(--muted);margin-top:1px;line-height:1.4;}
.feed-time{font-size:10px;color:var(--muted);font-weight:700;flex-shrink:0;}
.feed-photo{width:100%;border-radius:10px;object-fit:cover;max-height:320px;border:2px solid var(--sand-mid);cursor:pointer;margin-top:4px;}
.feed-tier-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:3px 8px;border-radius:99px;margin-left:4px;}
.feed-tier-bronze{background:var(--bronze-bg);color:var(--bronze);border:1.5px solid var(--bronze);}
.feed-tier-silver{background:var(--silver-bg);color:#555;border:1.5px solid var(--silver);}
.feed-tier-gold{background:var(--gold-bg);color:#8A6A00;border:1.5px solid var(--gold);}

@media(max-width:600px){.site-title{font-size:2rem;}main{padding:1rem .75rem 5rem;}.ach-grid{grid-template-columns:1fr;}}

/* ── WHO PICKER OVERLAY ── */
.who-overlay{display:none;position:fixed;inset:0;background:var(--sky);z-index:1000;overflow-y:auto;padding:2rem 1.25rem 3rem;}
.who-overlay.open{display:block;}
.who-overlay-title{font-family:'Lilita One',cursive;font-size:2rem;color:var(--ocean-dark);text-align:center;margin-bottom:.4rem;}
.who-overlay-sub{text-align:center;font-size:13px;color:var(--muted);font-weight:700;margin-bottom:1.5rem;}
.who-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;max-width:600px;margin:0 auto;}
.who-card{background:var(--cream);border-radius:var(--radius);padding:1.25rem .75rem 1rem;text-align:center;cursor:pointer;border:3px solid var(--sand-mid);transition:all .15s;box-shadow:3px 3px 0 var(--sand-dark);}
.who-card:hover{border-color:var(--ocean);transform:translateY(-3px);box-shadow:3px 6px 0 var(--ocean);}
.who-card-avatar{width:60px;height:60px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;border:3px solid rgba(255,255,255,0.6);}
.who-card-name{font-size:14px;font-weight:800;color:var(--text);}
.playing-as-bar{background:var(--ocean-dark);padding:5px 16px;display:flex;align-items:center;gap:8px;}
.playing-as-chip{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:800;color:var(--sand);}
.playing-as-switch{margin-left:auto;font-size:11px;font-weight:800;color:var(--sky);background:none;border:1.5px solid rgba(255,255,255,0.3);border-radius:99px;padding:3px 10px;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;}
.playing-as-switch:hover{background:rgba(255,255,255,0.15);}
</style>
</head>
<body>

<div class="site-header">
  <div class="header-rope"></div>
  <div class="header-inner">
    <div class="site-title">&#127958; Kismet House</div>
    <div class="site-sub">Fire Island Achievement Tracker</div>
  </div>
  <svg class="wave-divider" viewBox="0 0 1200 38" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,19 C200,38 400,0 600,19 C800,38 1000,0 1200,19 L1200,38 L0,38 Z" fill="#C8E8F5"/>
  </svg>
</div>

<!-- WHO PICKER OVERLAY -->
<div class="who-overlay" id="whoOverlay">
  <div style="text-align:center;font-size:3rem;margin-bottom:.5rem">🏖️</div>
  <div class="who-overlay-title">Kismet House</div>
  <div class="who-overlay-sub">Who's playing?</div>
  <div class="who-grid" id="whoGrid"></div>
</div>

<div class="sync-bar">
  <div class="sync-dot" id="syncDot"></div>
  <span class="sync-label" id="syncLabel">Connecting...</span>
</div>

<div class="playing-as-bar" id="playingAsBar" style="display:none;">
  <div class="playing-as-chip" id="playingAsChip"></div>
  <button class="playing-as-switch" onclick="openWhoOverlay(true)">Switch</button>
</div>

<nav class="main-nav" id="mainNav">
  <button class="nav-btn active" onclick="showView('home')">&#127968; Home</button>
  <button class="nav-btn" onclick="showView('achievements')">&#127894; All Badges</button>
  <button class="nav-btn" onclick="showView('feed')">&#128247; Family Feed</button>
  <button class="nav-btn" onclick="showView('map')">&#128506; Map</button>
  <button class="nav-btn" onclick="showView('fishing')">&#127907; Fishing Registry</button>
</nav>

<main id="appMain"><div class="loading">&#127958; Loading Kismet...</div></main>

<div class="fab-wrap"><button class="fab" onclick="openLogModal()">+ Log Progress</button></div>

<!-- LOG MODAL -->
<div class="modal-backdrop" id="logModal">
  <div class="modal-box">
    <button class="modal-close-btn" onclick="closeModal('logModal')">&#10005;</button>
    <div class="modal-title">Log Progress</div>
    <span class="modal-label">Who?</span><select id="logPerson"></select>
    <span class="modal-label">Badge</span><select id="logBadge" onchange="renderLogTierOptions()"></select>
    <span class="modal-label">Tier</span><select id="logTier" onchange="renderLogProgressField()"></select>
    <div id="logProgressWrap" style="margin-top:10px;"></div>
    <button class="modal-submit" onclick="saveLog()">Save</button>
  </div>
</div>

<!-- FISH MODAL -->
<div class="modal-backdrop" id="fishModal">
  <div class="modal-box">
    <button class="modal-close-btn" onclick="closeModal('fishModal')">&#10005;</button>
    <div class="modal-title" id="fishModalTitle">Log Catch</div>
    <span class="modal-label">Who caught it?</span><select id="fishPerson"></select>
    <button class="modal-submit" onclick="saveFish()">Save Catch</button>
  </div>
</div>

<!-- PHOTO PROMPT MODAL -->
<div class="modal-backdrop" id="photoModal">
  <div class="photo-prompt-box">

function emptyState(){
  const s={progress:{},fish:{},events:[]};
  PEOPLE.forEach(p=>{
    s.progress[p]={};s.fish[p]=[];
    BADGES.forEach(b=>{s.progress[p][b.id]={};b.tiers.forEach(t=>{s.progress[p][b.id][t.key]=0;});});
  });
  return s;
}

function setSyncStatus(status){
  const dot=document.getElementById('syncDot');
  const lbl=document.getElementById('syncLabel');
  if(status==='live'){dot.className='sync-dot live';lbl.style.color='';lbl.textContent='Live — changes sync instantly for everyone';}
  else if(status==='preview'){dot.className='sync-dot live';lbl.style.color='#B7791F';lbl.textContent='Preview mode — data is local only';}
  else if(status==='err'){dot.className='sync-dot err';lbl.textContent='Connection error — check internet';}
  else{dot.className='sync-dot';lbl.textContent='Connecting...';}
}

function saveState(){
  if(!dbReady)return;
  if(firebaseSet){
    firebaseSet(state);
  } else {
    try{localStorage.setItem(LOCAL_SK,JSON.stringify(state));}catch(e){}
  }
}

(function initLocal(){

  setSyncStatus('preview');
  if(!currentUser){
    openWhoOverlay(false);
  } else {
    updatePlayingAsBar();
    showView('player', currentUser);
  }
})();

(async function initFirebase(){
  try{
    const {initializeApp} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const {getDatabase,ref,onValue,set} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
    const app = initializeApp({
      apiKey:"AIzaSyBWLduhnOMjlnN4AxLb6ItCXEOFls4j_ao",
      authDomain:"kismet-house.firebaseapp.com",
      databaseURL:"https://kismet-house-default-rtdb.firebaseio.com",
      projectId:"kismet-house",
      storageBucket:"kismet-house.firebasestorage.app",
      messagingSenderId:"501723265281",
      appId:"1:501723265281:web:ef13366116e4ca61eec300"
    });
    const db = getDatabase(app);
    const rootRef = ref(db,'kismet');
    firebaseSet = (s)=>set(rootRef,s);
    onValue(rootRef,(snapshot)=>{
      const data=snapshot.val();
      if(data){
        state=emptyState();
        PEOPLE.forEach(p=>{
          if(data.progress?.[p])state.progress[p]={...state.progress[p],...data.progress[p]};
          if(data.fish?.[p])state.fish[p]=data.fish[p];
        });
        state.events=data.events||[];
      } else {
        state=emptyState();
        set(rootRef,state);
      }
      setSyncStatus('live');
      if(!currentUser){ openWhoOverlay(false); } else { updatePlayingAsBar(); renderMain(); }
    },(err)=>{console.log('Firebase unavailable, using local storage');});
  } catch(e){
    console.log('Firebase unavailable, using local storage');
  }
})();

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getP(person,bid,tkey){return(state.progress[person]?.[bid]?.[tkey])||0;}
function setP(person,bid,tkey,val){
  if(!state.progress[person])state.progress[person]={};
  if(!state.progress[person][bid])state.progress[person][bid]={};
  state.progress[person][bid][tkey]=val;
}
function countEarnedBadges(person){
  let n=0;
  BADGES.forEach(b=>{
    if(b.id==='kismetlegend')return;
    b.tiers.forEach(t=>{if(effectiveProgress(person,b,t)>=t.max)n++;});
  });
  return n;
}
function effectiveProgress(person,badge,tier){
  if(tier.fishAuto)return(state.fish[person]||[]).length;
  if(tier.legendAuto)return countEarnedBadges(person);
  return getP(person,badge.id,tier.key);
}
function isComplete(person,badge,tier){return effectiveProgress(person,badge,tier)>=tier.max;}
function getTierCounts(person){
  let b=0,s=0,g=0;
  BADGES.forEach(ba=>ba.tiers.forEach(t=>{
    if(isComplete(person,ba,t)){if(t.key==='bronze')b++;else if(t.key==='silver')s++;else g++;}
  }));
  return{b,s,g};
}

// Get photo for a person+badge+tier from events
function getEventPhoto(person, badgeId, tierKey){
  if(!state.events)return null;
  // Most recent event for this person+badge+tier that has a photo
  const evts = state.events.filter(e=>e.person===person&&e.badgeId===badgeId&&e.tierKey===tierKey&&e.photo);
  if(!evts.length)return null;
  return evts[evts.length-1].photo;
}

function getPersonIdx(name){return PEOPLE.indexOf(name);}

function timeAgo(ts){
  const diff=Date.now()-ts;
  const m=Math.floor(diff/60000);
  if(m<1)return'just now';
  if(m<60)return m+'m ago';
  const h=Math.floor(m/60);
  if(h<24)return h+'h ago';
  const d=Math.floor(h/24);
  return d+'d ago';
}

function makePatch(icon,color,size=44){
  const r=size/2,inner=r-size*.13;
  const nd=Math.floor(Math.PI*2*(r-size*.063)/(size*.09));
  let dots='';
  for(let i=0;i<nd;i++){const a=(i/nd)*Math.PI*2;dots+=`<circle cx="${(r+Math.cos(a)*(r-size*.063)).toFixed(1)}" cy="${(r+Math.sin(a)*(r-size*.063)).toFixed(1)}" r="${(size*.042).toFixed(1)}" fill="rgba(255,255,255,0.55)"/>`;}
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg"><circle cx="${r}" cy="${r}" r="${r-1}" fill="${color}" opacity="0.28"/><circle cx="${r}" cy="${r}" r="${inner}" fill="${color}"/><circle cx="${r}" cy="${r}" r="${inner}" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="${(size*.04).toFixed(1)}"/>${dots}<text x="${r}" y="${r}" font-size="${size*.42}" text-anchor="middle" dominant-baseline="central">${icon}</text></svg>`;
}

  if(currentView==='home')el.innerHTML=renderHome();
  else if(currentView==='player')el.innerHTML=renderPlayer(selectedPlayer);
  else if(currentView==='achievements')el.innerHTML=renderAllBadges();
  else if(currentView==='feed')el.innerHTML=renderFeed();
  else if(currentView==='fishing')el.innerHTML=renderFishing();
  else if(currentView==='map'){el.innerHTML=renderMap();initMapTip();}
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function renderHome(){
  let h=`<div class="section-title">The Family</div><div class="player-grid">`;
  PEOPLE.forEach((p,i)=>{
    const{b,s,g}=getTierCounts(p);const total=b+s+g;
    let pips='';
    for(let x=0;x<Math.min(g,5);x++)pips+=`<div class="pip" style="background:var(--gold)"></div>`;
    for(let x=0;x<Math.min(s,5);x++)pips+=`<div class="pip" style="background:var(--silver)"></div>`;
    for(let x=0;x<Math.min(b,5);x++)pips+=`<div class="pip" style="background:var(--bronze)"></div>`;
    h+=`<div class="player-card" onclick="showView('player','${p}')"><div class="p-avatar" style="background:${AVATARS_BG[i]}">${PERSON_ICONS[p]}</div><div class="p-name">${p}</div><div class="p-count">${total} badge${total!==1?'s':''}</div><div class="p-pips">${pips}</div></div>`;
  });
  return h+`</div>`;
}

// ── PLAYER ────────────────────────────────────────────────────────────────────
function renderPlayer(name){
  const idx=PEOPLE.indexOf(name);
  const{b,s,g}=getTierCounts(name);
  let h=`<button class="back-btn" onclick="showView('home')">&#8592; Back to Family</button>
  <div class="profile-header">
    <div class="profile-avatar" style="background:${AVATARS_BG[idx]}">${PERSON_ICONS[name]}</div>
    <div><div class="profile-name">${name}</div>
    <div class="profile-stats">
      <div class="ps"><div class="ps-num" style="color:var(--gold)">${g}</div><div class="ps-label">Gold</div></div>
      <div class="ps"><div class="ps-num" style="color:var(--silver)">${s}</div><div class="ps-label">Silver</div></div>
      <div class="ps"><div class="ps-num" style="color:var(--bronze)">${b}</div><div class="ps-label">Bronze</div></div>
    </div></div>
  </div><div class="ach-grid">`;
  BADGES.forEach(badge=>{
    h+=`<div class="ach-card"><div class="ach-head">${makePatch(badge.icon,badge.color,44)}<div class="ach-title">${badge.name}</div></div>`;
    badge.tiers.forEach(tier=>{
      const prog=effectiveProgress(name,badge,tier);
      const max=tier.max,pct=Math.min(100,Math.round((prog/max)*100)),done=prog>=max;
      const isBool=tier.type==='boolean'||max===1,isAuto=!!(tier.fishAuto||tier.legendAuto);
      const photo=done?getEventPhoto(name,badge.id,tier.key):null;

      let control='';
      if(done){
        if(isAuto)control=`<div class="check-toggle done" style="cursor:default" title="Auto-tracked">&#10003;</div>`;
        else if(isBool)control=`<div class="check-toggle done" title="Click to undo" onclick="toggleBool('${name}','${badge.id}','${tier.key}')">&#10003;</div>`;
        else control=`<div class="stepper"><button class="step-btn" onclick="adjustProg('${name}','${badge.id}','${tier.key}',-1,${max})">&#8722;</button><div class="check-toggle done" style="cursor:default">&#10003;</div></div>`;
      } else {
        if(isAuto)control=`<span style="font-size:10px;color:var(--muted);flex-shrink:0;text-align:center;line-height:1.3">auto<br>tracked</span>`;
        else if(isBool)control=`<div class="check-toggle" title="Mark as done" onclick="toggleBool('${name}','${badge.id}','${tier.key}')"></div>`;
        else control=`<div class="stepper"><button class="step-btn" onclick="adjustProg('${name}','${badge.id}','${tier.key}',-1,${max})">&#8722;</button><button class="step-btn" onclick="adjustProg('${name}','${badge.id}','${tier.key}',1,${max})">+</button></div>`;
      }

      // Photo thumbnail or camera button for completed tiers
      let photoEl='';
      if(done && !isAuto){
        if(photo){
          const cap=`${name} — ${badge.name} ${tier.label}`;
          const escapedCap=cap.replace(/'/g,"\\'");
          const escapedPhoto=photo.substring(0,50); // just for onclick check
          photoEl=`<img class="tier-photo-thumb" src="${photo}" alt="Achievement photo" onclick="openLightbox('${photo.replace(/'/g,"\\'")}','${escapedCap}')"/>`;
        } else {
          photoEl=`<div class="tier-cam-placeholder" title="Add a photo" onclick="openPhotoPromptForExisting('${name}','${badge.id}','${tier.key}','${badge.name}','${tier.desc.replace(/'/g,"\\'")}','${badge.icon}')">📷</div>`;
        }
      }

      h+=`<div class="tier-row"><span class="tier-label tl-${tier.key}">${tier.label}</span>
        <div class="tier-progress-wrap"><div class="tier-desc">${tier.desc}</div>
        ${!isBool||isAuto?`<div class="prog-bar-outer"><div class="prog-bar-fill" style="width:${pct}%;background:${TIER_COLORS[tier.key]}"></div></div><div class="prog-label">${prog}/${max}${tier.unit?' '+tier.unit:''}</div>`:''}
        </div>${photoEl}${control}</div>`;
    });
    h+=`</div>`;
  });
  return h+`</div>`;
}

function removeEvents(person,bid,tkey){
  if(!state.events)return;
  state.events=state.events.filter(e=>!(e.person===person&&e.badgeId===bid&&e.tierKey===tkey));
}

function toggleBool(person,bid,tkey){
  const wasComplete=getP(person,bid,tkey)>=1;
  setP(person,bid,tkey,wasComplete?0:1);
  if(!wasComplete){
    // Just completed — show photo prompt
    const badge=BADGES.find(b=>b.id===bid);
    const tier=badge.tiers.find(t=>t.key===tkey);
    saveState();
    openPhotoPrompt(person,bid,tkey,badge.name,tier.desc,badge.icon);
  } else {
    // Unchecked — remove from feed
    removeEvents(person,bid,tkey);
    saveState();renderMain();
  }
}

function adjustProg(person,bid,tkey,delta,max){
  const prev=getP(person,bid,tkey);
  const next=Math.max(0,Math.min(max,prev+delta));
  setP(person,bid,tkey,next);
  if(next>=max && prev<max){
    // Just hit completion
    const badge=BADGES.find(b=>b.id===bid);
    const tier=badge.tiers.find(t=>t.key===tkey);
    saveState();
    openPhotoPrompt(person,bid,tkey,badge.name,tier.desc,badge.icon);
  } else {
    // If dropping below completion, remove feed entry
    if(prev>=max && next<max) removeEvents(person,bid,tkey);
    saveState();renderMain();
  }
}

function openPhotoPrompt(person,badgeId,tierKey,badgeName,tierDesc,badgeIcon){
  pendingPhotoContext={person,badgeId,tierKey,badgeName,tierDesc,badgeIcon};
  pendingPhotoBase64=null;
  document.getElementById('photoModalEmoji').textContent='🎉';
  document.getElementById('photoModalTitle').textContent=`${badgeName} — ${tierKey.charAt(0).toUpperCase()+tierKey.slice(1)} earned!`;
  document.getElementById('photoModalSub').textContent=tierDesc;
  document.getElementById('photoPreview').style.display='none';
  document.getElementById('photoPreview').src='';
  document.getElementById('photoFileInput').value='';
  document.getElementById('photoSaveBtn').textContent='Save with Photo';
  document.getElementById('photoModal').classList.add('open');
}

function openPhotoPromptForExisting(person,badgeId,tierKey,badgeName,tierDesc,badgeIcon){
  // For adding photo to already-completed tier
  pendingPhotoContext={person,badgeId,tierKey,badgeName,tierDesc,badgeIcon,existingOnly:true};
  pendingPhotoBase64=null;
  document.getElementById('photoModalEmoji').textContent='📷';
  document.getElementById('photoModalTitle').textContent=`Add a photo`;
  document.getElementById('photoModalSub').textContent=`${badgeName} — ${tierKey.charAt(0).toUpperCase()+tierKey.slice(1)}: ${tierDesc}`;
  document.getElementById('photoPreview').style.display='none';
  document.getElementById('photoPreview').src='';
  document.getElementById('photoFileInput').value='';
  document.getElementById('photoSaveBtn').textContent='Save Photo';
  document.getElementById('photoModal').classList.add('open');
}

function handlePhotoSelect(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    pendingPhotoBase64=e.target.result;
    const preview=document.getElementById('photoPreview');
    preview.src=pendingPhotoBase64;
    preview.style.display='block';
    document.getElementById('photoSaveBtn').textContent=pendingPhotoContext?.existingOnly?'Save Photo':'Save with Photo ✓';
  };
  reader.readAsDataURL(file);
}

function addEvent(person,badgeId,tierKey,badgeName,tierDesc,photo){
  if(!state.events)state.events=[];
  state.events.push({
    person,badgeId,tierKey,badgeName,tierDesc,
    timestamp:Date.now(),
    photo:photo||null
  });
}

function saveWithPhoto(){
  if(!pendingPhotoContext)return;
  const{person,badgeId,tierKey,badgeName,tierDesc}=pendingPhotoContext;
  addEvent(person,badgeId,tierKey,badgeName,tierDesc,pendingPhotoBase64||null);
  saveState();
  closeModal('photoModal');
  renderMain();
}

function saveWithoutPhoto(){
  if(!pendingPhotoContext)return;
  const{person,badgeId,tierKey,badgeName,tierDesc,existingOnly}=pendingPhotoContext;
  if(!existingOnly){
    // Still log the event, just without photo
    addEvent(person,badgeId,tierKey,badgeName,tierDesc,null);
    saveState();
  }
  closeModal('photoModal');
  renderMain();
}

function cancelPhotoPrompt(){
  if(!pendingPhotoContext)return;
  const{person,badgeId,tierKey,existingOnly}=pendingPhotoContext;
  if(!existingOnly){
    // Undo the completion — reverse what toggleBool/adjustProg did
    setP(person,badgeId,tierKey,0);
    saveState();
  }
  pendingPhotoContext=null;
  pendingPhotoBase64=null;
  closeModal('photoModal');
  renderMain();
}

// ── FEED ──────────────────────────────────────────────────────────────────────
function renderFeed(){
  const events=(state.events||[]).slice().reverse();
  let h=`<div class="section-title">&#128247; Family Feed</div>`;
  if(!events.length){
    return h+`<div class="feed-empty">No achievements logged yet.<br>Complete a badge to see it here! 🏅</div>`;
  }
  events.forEach(ev=>{
    const idx=getPersonIdx(ev.person);
    const bg=idx>=0?AVATARS_BG[idx]:'#888';
    const icon=PERSON_ICONS[ev.person]||'🏅';
    const tierMoji=TIER_EMOJI[ev.tierKey]||'🏅';
    const tierClass=`feed-tier-${ev.tierKey}`;
    const age=timeAgo(ev.timestamp);
    const photoId=`feedphoto_${ev.timestamp}`;
    h+=`<div class="feed-card">
      <div class="feed-header">
        <div class="feed-avatar" style="background:${bg}">${icon}</div>
        <div class="feed-meta">
          <div class="feed-who">${ev.person} <span class="feed-tier-badge ${tierClass}">${tierMoji} ${ev.tierKey.charAt(0).toUpperCase()+ev.tierKey.slice(1)}</span></div>
          <div class="feed-what">earned <strong>${ev.badgeName}</strong>${ev.tierDesc?` · <em style="font-weight:600;color:var(--muted)">${ev.tierDesc}</em>`:''}</div>
        </div>
        <div class="feed-time">${age}</div>
      </div>
      ${ev.photo?`<img class="feed-photo" src="${ev.photo}" alt="Achievement photo" onclick="openLightbox('${ev.photo.replace(/'/g,"\\'")}','${(ev.person+' — '+ev.badgeName).replace(/'/g,"\\'")}')"/>`:''}
    </div>`;
  });
  return h;
}

// ── LEADERBOARD ───────────────────────────────────────────────────────────────
function renderLeaderboard(){
  const ranked=PEOPLE.map((p,i)=>{const{b,s,g}=getTierCounts(p);return{name:p,idx:i,b,s,g,score:g*3+s*2+b};}).sort((a,c)=>c.score-a.score);
  let h=`<div class="section-title">Leaderboard</div><div class="leaderboard">`;
  ranked.forEach((p,rank)=>{
    const rc=rank===0?'r1':rank===1?'r2':rank===2?'r3':'';
    const medal=rank===0?'&#129351;':rank===1?'&#129352;':rank===2?'&#129353;':`${rank+1}`;
    h+=`<div class="lb-row" onclick="showView('player','${p.name}')"><div class="lb-rank ${rc}">${medal}</div><div class="lb-av" style="background:${AVATARS_BG[p.idx]}">${PERSON_ICONS[p.name]}</div><div class="lb-name">${p.name}</div><div class="lb-right">${p.g?`<span style="color:var(--gold);font-weight:800">&#127941; ${p.g}</span>`:''} ${p.s?`<span style="color:var(--silver);font-weight:800">&#129352; ${p.s}</span>`:''} ${p.b?`<span style="color:var(--bronze);font-weight:800">&#129353; ${p.b}</span>`:''} ${!p.score?`<span style="font-size:11px">No badges yet</span>`:''}</div></div>`;
  });
  return h+`</div>`;
}

// ── ALL BADGES ────────────────────────────────────────────────────────────────
function renderAllBadges(){
  let h=`<div class="section-title">All Badges</div><div class="ach-grid">`;
  BADGES.forEach(badge=>{
    h+=`<div class="ach-card"><div class="ach-head">${makePatch(badge.icon,badge.color,44)}<div class="ach-title">${badge.name}</div></div>`;

}

function showFishTip(id,e){const t=document.getElementById(id);if(!t)return;t.classList.add('on');moveFishTip(id,e);}
function hideFishTip(id){const t=document.getElementById(id);if(t)t.classList.remove('on');}
function moveFishTip(id,e){const t=document.getElementById(id);if(!t)return;const wrap=t.closest('.fish-card-wrap');const r=wrap.getBoundingClientRect();let x=e.clientX-r.left+12,y=e.clientY-r.top-20;if(x+230>r.width)x=e.clientX-r.left-240;if(y<0)y=10;t.style.left=x+'px';t.style.top=y+'px';}
function undoFish(fish,person){
  if(!state.fish[person])return;
  state.fish[person]=state.fish[person].filter(f=>f!==fish);
  if(state.fish[person].length===0)setP(person,'fishing','bronze',0);
  saveState();renderMain();
}

function landmarkGlowColor(badgeIds){
  let bestScore=0,bestColor=null;
  PEOPLE.forEach(p=>{badgeIds.forEach(bid=>{
    const badge=BADGES.find(b=>b.id===bid);if(!badge)return;
    badge.tiers.forEach(t=>{
      if(isComplete(p,badge,t)){
        const sc=t.key==='gold'?3:t.key==='silver'?2:1;
        if(sc>bestScore){bestScore=sc;bestColor=TIER_COLORS[t.key];}
      }
    });
  });});
  return{color:bestColor,score:bestScore};
}
function landmarkPopupHTML(lm){
  let html=`<div class="map-tip-title">${lm.label}</div>`;
  lm.badges.forEach(bid=>{
    const badge=BADGES.find(b=>b.id===bid);if(!badge)return;
    html+=`<div style="margin-top:5px;border-top:1px solid rgba(255,255,255,0.15);padding-top:4px;"><div style="font-size:10px;color:#aaa;margin-bottom:3px;">${badge.name}</div>`;
    const anyEarned=PEOPLE.some(p=>badge.tiers.some(t=>isComplete(p,badge,t)));
    PEOPLE.forEach(p=>{
      const earnedHere=badge.tiers.filter(t=>isComplete(p,badge,t));
      if(!earnedHere.length)return;
      const bestTier=earnedHere[earnedHere.length-1];
      html+=`<div class="map-tip-row"><span>${PERSON_ICONS[p]} ${p.split(' ')[0]}</span><span style="color:${TIER_COLORS[bestTier.key]};font-weight:800;font-size:11px;">${bestTier.key}</span></div>`;
    });
    if(!anyEarned)html+=`<div style="font-size:10px;color:#888;font-style:italic;">No one yet</div>`;
    html+=`</div>`;
  });
  return html;
}
function glowRing(lm,r=18){
  const g=landmarkGlowColor(lm.badges);
  if(!g.color)return'';
  return`<circle cx="${lm.cx}" cy="${lm.cy}" r="${r+5}" fill="${g.color}" opacity="0.25"/><circle cx="${lm.cx}" cy="${lm.cy}" r="${r+2}" fill="none" stroke="${g.color}" stroke-width="2.5"/>`;
}

function initMapTip(){
  const outer=document.getElementById('mapOuter');if(!outer)return;
  const tip=document.getElementById('mapTip'),box=document.getElementById('mapTipBox');
  outer.querySelectorAll('.map-lm').forEach(el=>{
    el.addEventListener('mouseenter',e=>{const lm=MAP_LANDMARKS.find(l=>l.id===el.getAttribute('data-lm'));if(!lm)return;box.innerHTML=landmarkPopupHTML(lm);tip.classList.add('on');posTip(e,outer,tip);});
    el.addEventListener('mousemove',e=>posTip(e,outer,tip));
    el.addEventListener('mouseleave',()=>tip.classList.remove('on'));
    el.addEventListener('click',e=>{const lm=MAP_LANDMARKS.find(l=>l.id===el.getAttribute('data-lm'));if(!lm)return;box.innerHTML=landmarkPopupHTML(lm);tip.classList.toggle('on');posTip(e,outer,tip);});
  });
}
function posTip(e,outer,tip){const r=outer.getBoundingClientRect();let x=e.clientX-r.left+14,y=e.clientY-r.top-10;if(x+180>r.width)x=e.clientX-r.left-190;tip.style.left=x+'px';tip.style.top=y+'px';}

// ── MODALS ────────────────────────────────────────────────────────────────────
function openLogModal(){
  document.getElementById('logPerson').innerHTML=PEOPLE.map(p=>`<option${p===currentUser?' selected':''}>` + p + `</option>`).join('');
  document.getElementById('logBadge').innerHTML=BADGES.map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
  renderLogTierOptions();
  document.getElementById('logModal').classList.add('open');
}
function renderLogTierOptions(){
  const bid=document.getElementById('logBadge').value;
  const badge=BADGES.find(b=>b.id===bid);
  document.getElementById('logTier').innerHTML=badge.tiers.map(t=>`<option value="${t.key}">${t.label} — ${t.desc.slice(0,45)}${t.desc.length>45?'...':''}</option>`).join('');
  renderLogProgressField();
}
function renderLogProgressField(){
  const bid=document.getElementById('logBadge').value,tkey=document.getElementById('logTier').value;
  const badge=BADGES.find(b=>b.id===bid),tier=badge.tiers.find(t=>t.key===tkey);
  const wrap=document.getElementById('logProgressWrap');
  if(tier.fishAuto||tier.legendAuto){wrap.innerHTML=`<p style="font-size:12px;color:var(--muted);font-weight:600">This tier is tracked automatically.</p>`;return;}
  if(tier.type==='boolean'||tier.max===1){wrap.innerHTML='';return;}
  wrap.innerHTML=`<span class="modal-label">Add how many ${tier.unit||'progress'}?</span><input type="number" id="logAmount" value="1" min="1" max="${tier.max}" style="width:120px"/>`;
}
function saveLog(){
  const person=document.getElementById('logPerson').value;
  const bid=document.getElementById('logBadge').value,tkey=document.getElementById('logTier').value;
  const badge=BADGES.find(b=>b.id===bid),tier=badge.tiers.find(t=>t.key===tkey);
  if(tier.fishAuto||tier.legendAuto){closeModal('logModal');return;}
  const amtEl=document.getElementById('logAmount'),amt=amtEl?Math.max(1,parseInt(amtEl.value)||1):1;
  const prev=getP(person,bid,tkey);
  if(tier.type==='boolean'||tier.max===1)setP(person,bid,tkey,1);
  else setP(person,bid,tkey,Math.min(tier.max,prev+amt));
  const next=getP(person,bid,tkey);
  saveState();
  closeModal('logModal');
  if(next>=tier.max && prev<tier.max){
    openPhotoPrompt(person,bid,tkey,badge.name,tier.desc,badge.icon);
  } else {
    renderMain();
  }
}
function openFishModal(fish){
  pendingFish=fish;
  document.getElementById('fishModalTitle').textContent='Log catch: '+fish;
  document.getElementById('fishPerson').innerHTML=PEOPLE.map(p=>`<option>${p}</option>`).join('');
  document.getElementById('fishModal').classList.add('open');
}
function saveFish(){
  const person=document.getElementById('fishPerson').value;
  if(!state.fish[person])state.fish[person]=[];
  if(!state.fish[person].includes(pendingFish))state.fish[person].push(pendingFish);
  if(getP(person,'fishing','bronze')===0)setP(person,'fishing','bronze',1);
  saveState();closeModal('fishModal');renderMain();
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
